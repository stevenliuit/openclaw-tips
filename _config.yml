# Open AI 分享站 - Hexo Configuration

url: https://stevenliuit.github.io
root: /
permalink: :title/
permalink_defaults:

# Site
title: Open AI 分享站
subtitle: 每日分享 OpenClaw、AI Agent、Skills 教程
description: OpenClaw 开源 AI 助手框架教程网站
author: Steven Liu
language: zh-CN
timezone: Asia/Shanghai

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  open_in_new_tab: true
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ""
  wrap: true
  hljs: false

# Category & Tag
default_category: tutorial
category_map:
  tutorial: 教程
  skills: 技能
  channels: 渠道
  security: 安全
  concepts: 概念
  comparison: 对比
  development: 开发
  trends: 趋势
  reference: 参考
  automation: 自动化
  platforms: 平台

# Pagination - 减少每页文章数提高加载速度
per_page: 12
pagination_dir: page

# 不渲染的图片和其他资源文件
skip_render:
  - "*.ico"
  - "images/*"

# Extension
theme: custom

# Deployment
deploy:
  type: git
  repo: https://github.com/stevenliuit/openclaw-tips.git
  branch: gh-pages
